name: Rust Multi-Platform Release

on:
  push:
    tags:
      - 'v*'  # 正式 Release
  workflow_dispatch:       # 手动触发预览版本
    inputs:
      date:
        description: 'Preview date (optional, default today)'
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build Linux release
        run: cargo build --release

      - name: Prepare Linux artifact
        run: |
          BIN_NAME=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].targets[] | select(.kind[]=="bin") | .name')
          mkdir -p release
          cp target/release/$BIN_NAME release/$BIN_NAME-linux
          tar -czf release/$BIN_NAME-linux.tar.gz -C release $BIN_NAME-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: release/*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build Windows release (MSVC)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare Windows artifact
        shell: pwsh
        run: |
          $bin = (cargo metadata --format-version=1 --no-deps | ConvertFrom-Json).packages[0].targets | Where-Object { $_.kind -contains "bin" } | Select-Object -ExpandProperty name
          mkdir release
          Copy-Item "target\x86_64-pc-windows-msvc\release\$bin.exe" -Destination "release\$bin-windows.exe"
          Compress-Archive -Path "release\$bin-windows.exe" -DestinationPath "release\$bin-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: release/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build macOS release
        run: cargo build --release

      - name: Prepare macOS artifact
        run: |
          BIN_NAME=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].targets[] | select(.kind[]=="bin") | .name')
          mkdir -p release
          cp target/release/$BIN_NAME release/$BIN_NAME-macos
          tar -czf release/$BIN_NAME-macos.tar.gz -C release $BIN_NAME-macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: release/*.tar.gz

  upload-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Determine release tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE="${{ github.event.inputs.date }}"
          else
            DATE=$(date +%Y-%m-%d)
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG=${GITHUB_REF_NAME}
            DRAFT=false
            PRERELEASE=false
          else
            TAG="preview-$DATE"
            DRAFT=true
            PRERELEASE=true
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "draft=$DRAFT" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-artifact
          path: release

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          draft: ${{ steps.vars.outputs.draft }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
