name: Rust Multi-Platform Release

on:
  push:
    tags:
      - 'v*'  # 例如 v1.0.0
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build Linux release
        run: cargo build --release

      - name: Prepare Linux artifact
        run: |
          BIN_NAME=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].targets[] | select(.kind[]=="bin") | .name')
          mkdir -p release
          cp target/release/$BIN_NAME release/$BIN_NAME-linux
          zip -j release/$BIN_NAME-linux.zip release/$BIN_NAME-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v3
        with:
          name: linux-artifact
          path: release/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build Windows release (MSVC)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare Windows artifact
        shell: pwsh
        run: |
          $bin = (cargo metadata --format-version=1 --no-deps | ConvertFrom-Json).packages[0].targets | Where-Object { $_.kind -contains "bin" } | Select-Object -ExpandProperty name
          mkdir release
          Copy-Item "target\x86_64-pc-windows-msvc\release\$bin.exe" -Destination "release\$bin-windows.exe"
          Compress-Archive -Path "release\$bin-windows.exe" -DestinationPath "release\$bin-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-artifact
          path: release/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build macOS release
        run: cargo build --release

      - name: Prepare macOS artifact
        run: |
          BIN_NAME=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].targets[] | select(.kind[]=="bin") | .name')
          mkdir -p release
          cp target/release/$BIN_NAME release/$BIN_NAME-macos
          zip -j release/$BIN_NAME-macos.zip release/$BIN_NAME-macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v3
        with:
          name: macos-artifact
          path: release/*.zip

  upload-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v3
        with:
          name: linux-artifact
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v3
        with:
          name: windows-artifact
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v3
        with:
          name: macos-artifact
          path: release

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
